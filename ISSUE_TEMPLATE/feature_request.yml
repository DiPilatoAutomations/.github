name: Feature request
description: Something this should do but doesn't.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What manual work or gap does this create today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What you'd like it to do
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: What you do instead today
